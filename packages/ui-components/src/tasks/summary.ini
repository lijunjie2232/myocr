graph TB
    A[用户点击开始按钮] --> B[handleProcessTask]
    B --> C[设置状态为 processing]
    C --> D{检查文本长度}
    D -->|超过 chunkSize| E[分割文本为多个块]
    D -->|小于 chunkSize| F[单个块处理]
    E --> G[Map 阶段：并行处理每个块]
    G --> H[Reduce 阶段：合并摘要]
    H --> I[最终摘要]
    F --> I
    I --> J[更新任务结果为摘要]
    J --> K[设置状态为 completed]
    
    style E fill:#e3f2fd
    style G fill:#fff3e0
    style H fill:#f3e5f5